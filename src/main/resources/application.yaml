spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  application:
    name: booking

  datasource:
    url: jdbc:mysql://localhost:3306/booking?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: user
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
        order_updates: true
        order_inserts: true
    show-sql: true

logging:
  level:
    org.hibernate.SQL: debug